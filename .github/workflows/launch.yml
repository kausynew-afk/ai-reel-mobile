name: Launch Reel Generator for Mobile

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the server alive (minutes)"
        required: false
        default: "60"
        type: choice
        options:
          - "30"
          - "60"
          - "120"
          - "180"

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout tunnel repo
        uses: actions/checkout@v4

      - name: Clone AI Reel Generator
        run: |
          git clone https://github.com/kausynew-afk/ai-reel-generator.git reel-app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: |
          pip install -r reel-app/backend/requirements.txt
          pip install pyngrok

      - name: Verify Ngrok Token
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          if [ -z "$NGROK_AUTH_TOKEN" ]; then
            echo "ERROR: NGROK_AUTH_TOKEN secret is not set!"
            echo "Go to repo Settings → Secrets → Actions → New secret"
            exit 1
          fi
          echo "[✓] NGROK_AUTH_TOKEN is set (${#NGROK_AUTH_TOKEN} chars)"

      - name: Start Reel Generator server
        run: |
          cd reel-app/backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/api/bgm/library > /dev/null && echo "[✓] Server running on port 8000" || echo "[!] Server may not be ready"

      - name: Start Ngrok Tunnel & Show URL
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          python tunnel.py &
          sleep 15

          if [ ! -f tunnel_url.txt ]; then
            echo "ERROR: Tunnel failed to start. Check your NGROK_AUTH_TOKEN."
            exit 1
          fi

          TUNNEL_URL=$(cat tunnel_url.txt)
          echo ""
          echo "========================================================="
          echo "  OPEN THIS URL ON YOUR PHONE:"
          echo "  >>> $TUNNEL_URL"
          echo "========================================================="

          echo "## Reel Generator Mobile URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Open this on your phone:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### $TUNNEL_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tunnel is active until you cancel this workflow." >> $GITHUB_STEP_SUMMARY

      - name: Keep alive
        run: |
          DURATION=${{ github.event.inputs.duration_minutes || '60' }}
          TUNNEL_URL=$(cat tunnel_url.txt)
          echo ""
          echo "========================================================="
          echo "  YOUR MOBILE URL: $TUNNEL_URL"
          echo "  Server will stay alive for $DURATION minutes."
          echo "  Cancel this workflow when you're done."
          echo "========================================================="
          echo ""

          END_TIME=$((SECONDS + DURATION * 60))
          while [ $SECONDS -lt $END_TIME ]; do
            REMAINING=$(( (END_TIME - SECONDS) / 60 ))
            echo "[$(date '+%H:%M:%S')] Server alive — $REMAINING min remaining — URL: $TUNNEL_URL"
            sleep 60
          done

          echo ""
          echo "[*] Time's up. Server shutting down."
