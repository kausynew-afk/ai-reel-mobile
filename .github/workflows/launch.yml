name: Launch Reel Generator for Mobile

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the server alive (minutes)"
        required: false
        default: "60"
        type: choice
        options:
          - "30"
          - "60"
          - "120"
          - "180"

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout tunnel repo
        uses: actions/checkout@v4

      - name: Clone AI Reel Generator
        run: |
          git clone https://github.com/kausynew-afk/ai-reel-generator.git reel-app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: pip install -r reel-app/backend/requirements.txt

      - name: Install Cloudflare Tunnel
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure server for cloud
        run: |
          # Write Gemini key to file (reliable across all processes)
          echo "$GEMINI_API_KEY" > reel-app/backend/.gemini_key
          echo "[✓] Gemini API key written to file (${#GEMINI_API_KEY} chars)"

          # Patch main.py for cloud (JSON support, no Ollama)
          cp cloud_main_patch.py reel-app/backend/main.py
          echo "[✓] Server patched for cloud deployment"

          # Verify key is readable
          KEY_LEN=$(wc -c < reel-app/backend/.gemini_key)
          echo "[✓] Key file: $KEY_LEN bytes"

      - name: Test Gemini API key
        run: |
          cd reel-app/backend
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from pipeline.script_generator import ScriptGenerator
          sg = ScriptGenerator()
          import asyncio
          try:
              result = asyncio.run(sg.generate('Test topic', 'comedy', 15, 'gemini'))
              print('[✓] Gemini API works! Script generated successfully.')
          except Exception as e:
              print(f'[✗] Gemini API error: {e}')
              sys.exit(1)
          "

      - name: Start Reel Generator server
        run: |
          cd reel-app/backend
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/server.log 2>&1 &
          sleep 5

          if curl -sf http://localhost:8000/api/bgm/library > /dev/null; then
            echo "[✓] Server running on port 8000"
          else
            echo "[✗] Server failed to start. Log:"
            cat /tmp/server.log
            exit 1
          fi

      - name: Test script generation via API
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8000/api/script/generate \
            -H "Content-Type: application/json" \
            -d '{"topic":"funny cats","tone":"comedy","duration_seconds":30,"provider":"gemini","session_id":"test123"}')

          if echo "$RESPONSE" | python -c "import sys,json; d=json.load(sys.stdin); print('[✓] Script:', d.get('title','ok')[:50])"; then
            echo "[✓] Script generation API works!"
          else
            echo "[✗] Script generation failed. Response: $RESPONSE"
            cat /tmp/server.log
            exit 1
          fi

      - name: Start Tunnel & Show URL
        run: |
          cloudflared tunnel --url http://localhost:8000 --no-tls-verify 2>&1 | tee /tmp/cloudflared.log &

          echo "[*] Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            sleep 2
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: Tunnel failed to start."
            cat /tmp/cloudflared.log
            exit 1
          fi

          echo "$TUNNEL_URL" > tunnel_url.txt

          echo ""
          echo "========================================================="
          echo ""
          echo "  OPEN THIS URL ON YOUR PHONE:"
          echo ""
          echo "  >>> $TUNNEL_URL"
          echo ""
          echo "========================================================="

          echo "## Reel Generator Mobile URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Open this link on your phone:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### $TUNNEL_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tunnel is active until you cancel this workflow." >> $GITHUB_STEP_SUMMARY

      - name: Keep alive
        run: |
          DURATION=${{ github.event.inputs.duration_minutes || '60' }}
          TUNNEL_URL=$(cat tunnel_url.txt)
          echo ""
          echo "========================================================="
          echo "  YOUR MOBILE URL: $TUNNEL_URL"
          echo "  Server will stay alive for $DURATION minutes."
          echo "  Cancel this workflow when you're done."
          echo "========================================================="
          echo ""

          END_TIME=$((SECONDS + DURATION * 60))
          while [ $SECONDS -lt $END_TIME ]; do
            REMAINING=$(( (END_TIME - SECONDS) / 60 ))
            echo "[$(date '+%H:%M:%S')] Server alive — $REMAINING min remaining — URL: $TUNNEL_URL"
            sleep 60
          done

          echo "[*] Time's up. Server shutting down."
