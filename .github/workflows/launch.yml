name: Launch Reel Generator for Mobile

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the server alive (minutes)"
        required: false
        default: "60"
        type: choice
        options:
          - "30"
          - "60"
          - "120"
          - "180"

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout tunnel repo
        uses: actions/checkout@v4

      - name: Clone AI Reel Generator
        run: |
          git clone https://github.com/kausynew-afk/ai-reel-generator.git reel-app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: pip install -r reel-app/backend/requirements.txt

      - name: Install Cloudflare Tunnel
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Patch server for cloud deployment
        run: |
          cp reel-app/backend/main.py reel-app/backend/main.py.bak
          cp cloud_main_patch.py reel-app/backend/main.py
          echo "[✓] Server patched for cloud deployment"

      - name: Start Reel Generator server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd reel-app/backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/api/bgm/library > /dev/null && echo "[✓] Server running on port 8000" || echo "[!] Server not ready"

      - name: Start Tunnel & Show URL
        run: |
          cloudflared tunnel --url http://localhost:8000 --no-tls-verify 2>&1 | tee cloudflared.log &

          echo "[*] Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            sleep 2
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' cloudflared.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: Tunnel failed to start."
            cat cloudflared.log
            exit 1
          fi

          echo "$TUNNEL_URL" > tunnel_url.txt

          echo ""
          echo "========================================================="
          echo ""
          echo "  OPEN THIS URL ON YOUR PHONE:"
          echo ""
          echo "  >>> $TUNNEL_URL"
          echo ""
          echo "========================================================="

          cat >> $GITHUB_STEP_SUMMARY <<EOF

          ## Reel Generator Mobile URL

          **Open this link on your phone:**

          ### $TUNNEL_URL

          Tunnel is active until you cancel this workflow.
          EOF

      - name: Keep alive
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DURATION=${{ github.event.inputs.duration_minutes || '60' }}
          TUNNEL_URL=$(cat tunnel_url.txt)
          echo ""
          echo "========================================================="
          echo "  YOUR MOBILE URL: $TUNNEL_URL"
          echo "  Server will stay alive for $DURATION minutes."
          echo "  Cancel this workflow when you're done."
          echo "========================================================="
          echo ""

          END_TIME=$((SECONDS + DURATION * 60))
          while [ $SECONDS -lt $END_TIME ]; do
            REMAINING=$(( (END_TIME - SECONDS) / 60 ))
            echo "[$(date '+%H:%M:%S')] Server alive — $REMAINING min remaining — URL: $TUNNEL_URL"
            sleep 60
          done

          echo ""
          echo "[*] Time's up. Server shutting down."
